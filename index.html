let audioCtx = null;
let currentSource = null;
function getAudioCtx() {
if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
return audioCtx;
}
async function speakGoogle(text, slow = false) {
const encoded = encodeURIComponent(text);
const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encoded}&tl=de&ttsspeed=1&client=tw-ob`;
try {
// Always resume/create AudioContext inside user gesture handler
const ctx = getAudioCtx();
if (ctx.state === “suspended”) await ctx.resume();
const resp = await fetch(url, { headers: { “Referer”: “https://translate.google.com/” } });
if (!resp.ok) throw new Error(“fetch failed”);
const buf = await resp.arrayBuffer();
const decoded = await ctx.decodeAudioData(buf.slice(0));
if (currentSource) { try { currentSource.stop(); } catch {} }
const src = ctx.createBufferSource();
src.buffer = decoded;
src.playbackRate.value = slow ? 0.62 : 1.0;
src.connect(ctx.destination);
src.start();
currentSource = src;
return true;
} catch { return false; }
}
function speakWebSpeech(text, slow = false) {
if (!window.speechSynthesis) return false;
window.speechSynthesis.cancel();
const trySpeak = () => {
const voices = window.speechSynthesis.getVoices();
const priority = [
v => /Anna|Marlene|Vicki|Petra/i.test(v.name) && v.lang.startsWith(“de”),
v => /Google/i.test(v.name) && v.lang.startsWith(“de”),
v => /Microsoft/i.test(v.name) && v.lang.startsWith(“de”),
v => v.lang === “de-DE”, v => v.lang.startsWith(“de”),
];
let voice = null;
for (const p of priority) { voice = voices.find(p); if (voice) break; }
const chunks = text.length > 100 ? (text.match(/[^,;.!?–]+[,;.!?–]?\s*/g) || [text]) : [text];
chunks.forEach(chunk => {
const u = new SpeechSynthesisUtterance(chunk.trim());
u.lang = “de-DE”; u.rate = slow ? 0.52 : 0.84; u.pitch = 1.05; u.volume = 1;
if (voice) u.voice = voice;
window.speechSynthesis.speak(u);
});
};
if (window.speechSynthesis.getVoices().length === 0) window.speechSynthesis.onvoiceschanged = trySpeak;
else trySpeak();
return true;
}
let useGoogle = true, googleFails = 0;
async function speak(text, slow = false) {
if (useGoogle) {
const ok = await speakGoogle(text, slow);
if (!ok) { googleFails++; if (googleFails >= 2) useGoogle = false; speakWebSpeech(text, slow); }
} else speakWebSpeech(text, slow);
}
function stopAudio() {
try { if (currentSource) { currentSource.stop(); currentSource = null; } } catch {}
if (window.speechSynthesis) window.speechSynthesis.cancel();
}
if (typeof window !== “undefined” && window.speechSynthesis) {
window.speechSynthesis.getVoices();
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
if (typeof document !== “undefined”) {
const warmUp = () => { const ctx = getAudioCtx(); if (ctx.state === “suspended”) ctx.resume(); };
document.addEventListener(“touchstart”, warmUp, { once: true, passive: true });
document.addEventListener(“click”, warmUp, { once: true });
}

grammar:“WATCH OUT: ‘halb drei’ = 2:30, NOT 3:30! German uses ‘half TO’ not ‘half past’. Viertel vor vier = 3:45 (quarter TO four), Viertel nach vier = 4:15 (quarter PAST four). This confuses learners — commit it to memory now!”,
cards:[
{de:“Montag / Dienstag / Mittwoch”,en:“Monday / Tuesday / Wednesday”,example:“Von Montag bis Mittwoch bin ich im Büro.”,phonetic:“MOHN-tahk / DEENS-tahk / MIT-vokh”,tip:“Mittwoch = Mitte+Woche = mid-week!”},
{de:“Donnerstag / Freitag”,en:“Thursday / Friday”,example:“Freitag Abend — Feierabend!”,phonetic:“DON-ers-tahk / FRY-tahk”,tip:“Donner = thunder (Norse god Thor/Donar)”},
{de:“Samstag / Sonntag”,en:“Saturday / Sunday”,example:“Am Sonntag schläft man lange.”,phonetic:“ZAHMS-tahk / ZON-tahk”,tip:“Sonntag = Sun-day — logical!”},
{de:“heute / morgen / gestern”,en:“today / tomorrow / yesterday”,example:“Gestern war Montag, heute Dienstag.”,phonetic:“HOY-teh / MOR-gen / GES-tern”,tip:“The 3 time anchors — learn cold”},
{de:“übermorgen / vorgestern”,en:“day after tomorrow / day before yesterday”,example:“Ich bin übermorgen wieder zurück.”,phonetic:“ÜH-ber-mor-gen / FOR-ges-tern”,tip:“German has single words for these — great!”},
{de:“Wie spät ist es?”,en:“What time is it?”,example:“Entschuldigung, wie spät ist es?”,phonetic:“vee shpayt ist es”,tip:“spät = late — literally ‘how late is it?’”},
{de:“Es ist drei Uhr. / 15 Uhr.”,en:“It’s 3 o’clock. / It’s 3pm (15:00).”,example:“Der Zug fährt um 14 Uhr ab.”,phonetic:“es ist dry oor / fühnf-tsehn oor”,tip:“Formal schedules use 24-hour clock”},
{de:“halb drei = 2:30!”,en:“half three = 2:30 (NOT 3:30!)”,example:“Treffen wir uns um halb drei?”,phonetic:“halp dry”,tip:“TRAP: halb drei = half TO three = 2:30”},
{de:“Viertel vor vier = 3:45”,en:“quarter to four = 3:45”,example:“Es ist Viertel vor vier.”,phonetic:“FEER-tel for feer”,tip:“vor = before/to, nach = past/after”},
{de:“Viertel nach zwei = 2:15”,en:“quarter past two = 2:15”,example:“Der Kurs beginnt Viertel nach neun.”,phonetic:“FEER-tel nakh tsvy”,tip:“nach = past/after”},
{de:“Januar bis Juni”,en:“January to June”,example:“Mein Geburtstag ist im März.”,phonetic:“yah-NOO-ar / fay-BROO-ar / merts … YOO-nee”,tip:“im + month = ‘in’ that month”},
{de:“Juli bis Dezember”,en:“July to December”,example:“Das Oktoberfest beginnt im September!”,phonetic:“YOO-lee … deh-TSEM-ber”,tip:“Oktoberfest actually starts in late September!”},
],
quiz:[
{q:”‘Es ist halb drei’ — what time?”,options:[“3:00”,“2:30”,“3:30”,“2:00”],answer:1},
{q:”‘Viertel vor vier’ = ?”,options:[“4:15”,“3:45”,“4:45”,“3:15”],answer:1},
{q:“The word ‘übermorgen’ means:”,options:[“Yesterday”,“Tomorrow”,“Day after tomorrow”,“Next week”],answer:2},
{q:“Oktoberfest begins in:”,options:[“Oktober”,“August”,“September”,“November”],answer:2},
]
},
],
testQuestions:[
{q:“Polite way to order coffee:”,options:[“Kaffee!”,“Ich will Kaffee.”,“Ich möchte einen Kaffee, bitte.”,“Kaffee, danke.”],answer:2},
{q:“Which color is ‘gelb’?”,options:[“Red”,“Blue”,“Green”,“Yellow”],answer:3},
{q:”‘Es ist halb vier’ means:”,options:[“4:00”,“3:30”,“4:30”,“3:45”],answer:1},
{q:”‘Die Rechnung, bitte!’ =”,options:[“The menu, please”,“Another drink”,“The bill, please”,“Excuse me”],answer:2},
{q:”‘Prost!’ is said when:”,options:[“Saying goodbye”,“Toasting / cheers”,“Ordering food”,“Paying”],answer:1},
{q:”‘Wie viel kostet das?’ =”,options:[“Where is this?”,“How much does this cost?”,“What color is this?”,“Can I try this on?”],answer:1},
{q:”‘morgen’ means:”,options:[“Yesterday”,“Today”,“Tomorrow”,“Next week”],answer:2},
{q:”‘Günstig’ means:”,options:[“Expensive”,“Beautiful”,“Cheap/affordable”,“Large”],answer:2},
{q:“Mittwoch literally means:”,options:[“Wednesday”,“Mid-week”,“Meeting day”,“Work day”],answer:1},
{q:”‘Das passt gut’ means:”,options:[“That is beautiful”,“That fits well”,“That is expensive”,“That is mine”],answer:1},
]

{
id:3, title:“Woche 3”, subtitle:“Out & About”, color:”#74B9FF”, tier:“A1”,
lessons:[
{ id:“directions”, title:“Getting Around”, emoji:“🗺️”, color:”#74B9FF”,
story:“Dead phone battery in Munich. No maps. Just you, a confused expression, and brave German pedestrians.”,
grammar:“Use ‘Sie’ (formal) when asking strangers for directions. Key verbs: nehmen (to take), abbiegen (to turn), gehen (to go), fahren (to drive/ride). Separable verb: ab|biegen — the prefix ‘ab’ goes to the end: ‘biegen Sie links ab’.”,
cards:[
{de:“Entschuldigung, können Sie mir helfen?”,en:“Excuse me, can you help me?”,example:“Entschuldigung! Können Sie mir helfen?”,phonetic:“KÖN-en zee meer HEL-fen”,tip:“The perfect polite opener”},
{de:“Wo ist…? / Wie komme ich zu…?”,en:“Where is…? / How do I get to…?”,example:“Wie komme ich zum Marienplatz?”,phonetic:“voh ist / vee KOM-eh ikh tsoo”,tip:“zum = zu dem (to the, masc/neut)”},
{de:“links / rechts / geradeaus”,en:“left / right / straight ahead”,example:“Gehen Sie links, dann geradeaus.”,phonetic:“links / rekhts / geh-RAH-deh-ows”,tip:“The navigation holy trinity — learn first”},
{de:“die erste / zweite / dritte Straße”,en:“the first / second / third street”,example:“Nehmen Sie die zweite Straße rechts.”,phonetic:“ER-steh / TSVY-teh / DRIT-teh SHTRAH-seh”,tip:“Straße = street (ß = ss sound)”},
{de:“an der Ampel / an der Kreuzung”,en:“at the traffic light / at the intersection”,example:“An der Ampel links abbiegen.”,phonetic:“an der AM-pel / KROY-tsoong”,tip:“abbiegen = to turn (separable verb)”},
{de:“der Bahnhof / der Flughafen / die Haltestelle”,en:“train station / airport / bus stop”,example:“Wie weit ist es bis zum Bahnhof?”,phonetic:“BAHN-hohf / FLOOK-hah-fen / HAL-teh-shtel-leh”,tip:“Bahn = train, Flug = flight, Halt = stop”},
{de:“die U-Bahn / die S-Bahn / der Bus / die Tram”,en:“metro / suburban rail / bus / tram”,example:“Nehmen Sie die U3 bis Marienplatz.”,phonetic:“oo-bahn / es-bahn / boos / tram”,tip:“U = underground, S = Schnell (fast/surface)”},
{de:“zu Fuß / mit dem Taxi / mit der U-Bahn”,en:“on foot / by taxi / by metro”,example:“Es ist nur fünf Minuten zu Fuß!”,phonetic:“tsoo foos / mit dem TAKS-ee”,tip:“zu Fuß = on foot (literally ‘to foot’)”},
{de:“Wie weit ist es? / ungefähr…”,en:“How far is it? / approximately…”,example:“Ungefähr zehn Minuten zu Fuß.”,phonetic:“vee vyte ist es / OON-geh-fair”,tip:“ungefähr = approximately”},
{de:“Ich verstehe das nicht.”,en:“I don’t understand that.”,example:“Es tut mir leid, ich verstehe das nicht.”,phonetic:“ikh fer-SHTAY-eh das nikht”,tip:“Es tut mir leid = I’m sorry”},
{de:“Können Sie das wiederholen?”,en:“Can you repeat that?”,example:“Können Sie das bitte wiederholen?”,phonetic:“KÖN-en zee das VEE-der-hoh-len”,tip:“langsamer sprechen = speak more slowly”},
{de:“Können Sie das aufschreiben?”,en:“Can you write that down?”,example:“Ich verstehe nicht gut. Können Sie das aufschreiben?”,phonetic:“KÖN-en zee das OWF-shry-ben”,tip:“Super useful when you can’t catch the words!”},
],
quiz:[
{q:“You need the airport. You ask:”,options:[“Wo ist der Bahnhof?”,“Wo ist der Flughafen?”,“Wo ist die Toilette?”,“Wo ist der Bus?”],answer:1},
{q:”‘Gehen Sie geradeaus’ means:”,options:[“Turn left”,“Turn right”,“Go straight ahead”,“Go back”],answer:2},
{q:“Separable verb ‘abbiegen’ — ‘turn right’ is:”,options:[“Abbiegen Sie rechts”,“Biegen Sie rechts ab”,“Sie rechts abbiegen”,“Biegen ab Sie rechts”],answer:1},
{q:”‘Können Sie das aufschreiben?’ means:”,options:[“Can you speak slower?”,“Can you repeat that?”,“Can you write that down?”,“Can you help me?”],answer:2},
]
},
{ id:“verbs_core”, title:“Essential Verbs”, emoji:“⚡”, color:”#FFEAA7”,
story:“Verbs are the engine of every sentence. Nail these 12 and you can express almost anything basic!”,
grammar:“German verbs conjugate for person. Most follow patterns, but sein (to be) and haben (to have) are irregular — memorize them! Strong verbs change their vowel in the du/er form: fahren → du fährst, essen → du isst.”,
cards:[
{de:“sein: ich bin / du bist / er ist / wir sind”,en:“to be: I am / you are / he is / we are”,example:“Ich bin müde. Du bist lustig. Wir sind hier.”,phonetic:“zyne / bin / bist / ist / zint”,tip:“Most irregular verb in German — memorize!”},
{de:“haben: ich habe / du hast / er hat”,en:“to have: I have / you have / he has”,example:“Ich habe Hunger. Hast du Zeit?”,phonetic:“HAH-ben / HAH-beh / hast / hat”,tip:“Hunger haben = to be hungry (have hunger)”},
{de:“gehen: ich gehe / du gehst / er geht”,en:“to go: I go / you go / he goes”,example:“Ich gehe nach Hause. Wohin gehst du?”,phonetic:“GAY-en / GAY-eh / gayst / gayt”,tip:“Wohin = where to (direction)”},
{de:“kommen: ich komme / du kommst”,en:“to come: I come / you come”,example:“Woher kommst du? Ich komme aus Spanien.”,phonetic:“KOM-men / KOM-eh / komst”,tip:“Woher = where from”},
{de:“machen: ich mache / du machst / er macht”,en:“to do/make”,example:“Was machst du heute? — Ich mache Sport.”,phonetic:“MAH-khen / MAH-kheh / makhst”,tip:“Sport machen = to exercise”},
{de:“essen: ich esse / du isst / er isst”,en:“to eat”,example:“Was isst du gerne? Ich esse gerne Pizza.”,phonetic:“ES-en / ES-eh / ist”,tip:“Vowel change: e→i in du/er forms!”},
{de:“trinken: ich trinke / du trinkst”,en:“to drink”,example:“Ich trinke täglich Kaffee.”,phonetic:“TRIN-ken / TRIN-keh / trinkst”,tip:“täglich = daily”},
{de:“schlafen: ich schlafe / du schläfst”,en:“to sleep”,example:“Ich schlafe gut. Wie lange schläfst du?”,phonetic:“SHLAH-fen / shlayfst / shlayt”,tip:“Vowel change: a→ä in du/er forms”},
{de:“sprechen: ich spreche / du sprichst”,en:“to speak”,example:“Sprichst du Deutsch? — Ein bisschen!”,phonetic:“SHPREH-khen / shprikhst / shprikht”,tip:“Vowel change: e→i in du/er forms”},
{de:“fahren: ich fahre / du fährst / er fährt”,en:“to drive / travel (by vehicle)”,example:“Ich fahre mit dem Bus zur Arbeit.”,phonetic:“FAH-ren / fehrst / feyrt”,tip:“Vowel change: a→ä in du/er forms”},
{de:“wohnen: ich wohne / du wohnst”,en:“to live/reside”,example:“Wo wohnst du? — Ich wohne in Hamburg.”,phonetic:“VOH-nen / VOH-neh / vohnst”,tip:“Regular verb — very predictable!”},
{de:“möchten: ich möchte / du möchtest”,en:“would like (polite want)”,example:“Ich möchte tanzen. Was möchtest du machen?”,phonetic:“MÖSH-ten / MÖSH-teh / MÖSH-test”,tip:“Softer than wollen — use in requests”},
],
quiz:[
{q:“Conjugate ‘sein’ — ‘we are’ is:”,options:[“wir sein”,“wir haben”,“wir sind”,“wir bist”],answer:2},
{q:”‘Ich habe Hunger’ literally means:”,options:[“I am hungry”,“I have hunger”,“I want food”,“I eat now”],answer:1},
{q:“Strong verb ‘essen’ — du form is:”,options:[“du essest”,“du essen”,“du isst”,“du esst”],answer:2},
{q:”‘fahren’ vowel changes in du/er to:”,options:[“ü”,“ö”,“ä”,“No change”],answer:2},
]
},
{ id:“family”, title:“Family & Relationships”, emoji:“👨‍👩‍👧”, color:”#FD79A8”,
story:“Your German host family shows photo albums. ‘Und wer ist das?’ — who is everyone?”,
grammar:“Possessive adjectives: mein (my-masc), meine (my-fem), mein (my-neut). They follow the ‘ein’ pattern. ‘mein Vater, meine Mutter, mein Kind’. Learn the article with each family word!”,
cards:[
{de:“die Mutter / der Vater”,en:“mother / father”,example:“Meine Mutter heißt Ingrid.”,phonetic:“MOO-ter / FAH-ter”,tip:“Mutter→Mütter (plural with umlaut)”},
{de:“die Eltern (Plural!)”,en:“parents (always plural!)”,example:“Meine Eltern wohnen in Stuttgart.”,phonetic:“EL-tern”,tip:“No singular — always die Eltern”},
{de:“der Bruder / die Schwester”,en:“brother / sister”,example:“Ich habe einen Bruder und zwei Schwestern.”,phonetic:“BROO-der / SHVES-ter”,tip:“Geschwister = siblings (both together)”},
{de:“der Sohn / die Tochter”,en:“son / daughter”,example:“Ihr Sohn ist Arzt. Ihre Tochter studiert.”,phonetic:“zohn / TOKH-ter”,tip:“Kinder = children (plural of Kind)”},
{de:“der Großvater / die Großmutter”,en:“grandfather / grandmother”,example:“Mein Großvater ist 82 Jahre alt.”,phonetic:“GROHS-fah-ter / GROHS-moo-ter”,tip:“groß = big — Urgroßvater = great-grandfather”},
{de:“der Opa / die Oma”,en:“grandpa / grandma (informal)”,example:“Oma backt immer den besten Kuchen!”,phonetic:“OH-pah / OH-mah”,tip:“Far more common than Großvater/mutter”},
{de:“der Onkel / die Tante”,en:“uncle / aunt”,example:“Mein Onkel Klaus ist sehr lustig.”,phonetic:“ON-kel / TAN-teh”,tip:“Nichte = niece, Neffe = nephew”},
{de:“der Mann / die Frau”,en:“husband / wife (also: man / woman)”,example:“Das ist mein Mann Klaus.”,phonetic:“man / frow”,tip:“Context: mein Mann = my husband”},
{de:“der Freund / die Freundin”,en:“boyfriend/friend / girlfriend/friend”,example:“Das ist mein Freund Klaus. (friend or boyfriend!)”,phonetic:“froynt / FROYN-din”,tip:“Context: ‘mein Freund’ = boyfriend”},
{de:“das Kind / die Kinder”,en:“child / children”,example:“Sie haben drei Kinder.”,phonetic:“kint / KIN-der”,tip:“Kindergarten = children’s garden — you know this word!”},
{de:“Hast du Geschwister?”,en:“Do you have siblings?”,example:“Ja, ich habe zwei Schwestern.”,phonetic:“hast doo geh-SHVIS-ter”,tip:“Geschwister = siblings (no English parallel)”},
{de:“eine große / kleine Familie”,en:“a big / small family”,example:“Wir sind eine große Familie — sieben Personen!”,phonetic:“EYE-neh GROH-seh / KLY-neh fah-MEE-lee-eh”,tip:“groß = big, klein = small”},
],
quiz:[
{q:”‘Eltern’ is always:”,options:[“Singular”,“Plural”,“Either”,“Formal only”],answer:1},
{q:”‘Geschwister’ means:”,options:[“Brothers only”,“Sisters only”,“Siblings (brothers and sisters)”,“Parents”],answer:2},
{q:”‘Mein Freund’ can mean both:”,options:[“My teacher / my boss”,“My friend / my boyfriend”,“My uncle / my cousin”,“My father / my brother”],answer:1},
{q:“What is ‘die Tochter’?”,options:[“Mother”,“Grandmother”,“Sister”,“Daughter”],answer:3},
]
},
],
testQuestions:[
{q:“How do you ask ‘Where is the metro?’”,options:[“Wo ist der Bus?”,“Wo ist die U-Bahn?”,“Wo ist der Zug?”,“Wo ist das Taxi?”],answer:1},
{q:”‘Ich bin müde’ uses which verb?”,options:[“haben”,“machen”,“sein”,“gehen”],answer:2},
{q:”‘Zu Fuß’ means:”,options:[“By bus”,“By car”,“On foot”,“By train”],answer:2},
{q:“Strong verb ‘essen’ — du form:”,options:[“du essest”,“du essen”,“du isst”,“du esst”],answer:2},
{q:“What is ‘die Schwester’?”,options:[“Mother”,“Daughter”,“Sister”,“Grandmother”],answer:2},
{q:”‘Können Sie das wiederholen?’ =”,options:[“Can you speak slower?”,“Can you help me?”,“Can you repeat that?”,“Can you come here?”],answer:2},
{q:”‘Eltern’ means:”,options:[“Children”,“Parents”,“Grandparents”,“Siblings”],answer:1},
{q:“Your grandpa informal is:”,options:[“Großvater”,“Vater”,“Opa”,“Onkel”],answer:2},
{q:“Separable verb ‘abbiegen’ — ‘turn left’ is:”,options:[“Abbiegen links”,“Biegen Sie links ab”,“Links abbiegen”,“Biegen ab links”],answer:1},
{q:”‘Hast du Geschwister?’ =”,options:[“Do you have money?”,“Do you have time?”,“Do you have siblings?”,“Do you have food?”],answer:2},
]
},
{
id:4, title:“Woche 4”, subtitle:“Everyday Situations”, color:”#A29BFE”, tier:“A1”,
lessons:[
{ id:“body_health”, title:“Body, Health & Feelings”, emoji:“🩺”, color:”#A29BFE”,
story:“You’ve moved into a Berlin WG. First a cold, then a visit to the doctor. Learn to describe how you feel!”,
grammar:“Body parts: ‘tut weh’ = hurts (tun + weh). Ich habe + body part + -schmerzen = I have pain: ‘Kopfschmerzen’ (headache). Feeling verbs are reflexive: ‘Ich fühle mich krank’ — fühle + mich (myself).”,
cards:[
{de:“der Kopf / das Gesicht / der Hals”,en:“head / face / throat”,example:“Ich habe Kopfschmerzen und Halsschmerzen.”,phonetic:“kopf / geh-ZIKHT / hals”,tip:“Kopfschmerzen = headache, Halsschmerzen = sore throat”},
{de:“der Arm / die Hand / die Finger”,en:“arm / hand / fingers”,example:“Ich habe mir den Finger verletzt.”,phonetic:“arm / hant / FING-er”,tip:“verletzt = injured”},
{de:“das Bein / der Fuß / der Rücken / der Bauch”,en:“leg / foot / back / stomach”,example:“Mein Rücken tut weh. Hast du ein Schmerzmittel?”,phonetic:“byne / foos / RÜH-ken / bowkh”,tip:“Rückenschmerzen = backache, Bauchschmerzen = stomachache”},
{de:“Ich bin krank. / Ich bin gesund.”,en:“I am sick. / I am healthy.”,example:“Ich kann nicht kommen, ich bin krank.”,phonetic:“ikh bin krank / geh-ZOONT”,tip:“gesund = healthy — your goal after being krank!”},
{de:“Ich fühle mich nicht gut.”,en:“I don’t feel well.”,example:“Ich fühle mich heute gar nicht gut.”,phonetic:“ikh FÜH-leh mikh nikht goot”,tip:“fühlen = to feel (always reflexive here)”},
{de:“Ich habe Fieber / Husten / Schnupfen”,en:“I have a fever / cough / runny nose”,example:“Ich habe Fieber — 38,5 Grad!”,phonetic:“FEE-ber / HOOS-ten / SHNOOP-fen”,tip:“German decimals use comma: 38,5°C”},
{de:“müde / erschöpft / fit / energiegeladen”,en:“tired / exhausted / fit / full of energy”,example:“Nach der langen Reise bin ich erschöpft.”,phonetic:“MÜH-deh / er-SHÖPFT / fit / en-er-GEE-geh-lah-den”,tip:“erschöpft = thoroughly exhausted (stronger)”},
{de:“glücklich / traurig / wütend / aufgeregt”,en:“happy / sad / angry / excited”,example:“Ich bin so aufgeregt — morgen fliege ich!”,phonetic:“GLÜK-likh / TROW-rikh / VÜH-tent / OWF-geh-regt”,tip:“Wie fühlst du dich? = How do you feel?”},
{de:“die Apotheke / der Arzt / das Krankenhaus”,en:“pharmacy / doctor / hospital”,example:“Wo ist die nächste Apotheke?”,phonetic:“ah-poh-TAY-keh / artst / KRAN-ken-hows”,tip:“Krankenhaus = sick-house — perfect logic!”},
{de:“Ich brauche ein Schmerzmittel.”,en:“I need a painkiller.”,example:“Haben Sie Schmerzmittel? Mein Kopf tut weh.”,phonetic:“ikh BROW-kheh yne SHMERTZ-mit-tel”,tip:“Schmerz = pain, Mittel = remedy/means”},
{de:“Notruf: 112! / Rufen Sie einen Krankenwagen!”,en:“Emergency: 112! / Call an ambulance!”,example:“Notfall! Rufen Sie sofort einen Krankenwagen!”,phonetic:“NOHT-roof / KRAN-ken-vah-gen”,tip:“112 works across all EU countries!”},
{de:“Ich bin allergisch gegen… / Ich vertrage… nicht.”,en:“I’m allergic to… / I can’t tolerate…”,example:“Ich vertrage keinen Alkohol.”,phonetic:“ah-LER-gish GAY-gen / fer-TRAH-geh … nikht”,tip:“vertragen = to tolerate (for food sensitivities)”},
],
quiz:[
{q:“You have a headache. You say:”,options:[“Ich habe Fieber”,“Ich habe Husten”,“Ich habe Kopfschmerzen”,“Mir ist schlecht”],answer:2},
{q:“Where do you get medicine in Germany?”,options:[“Der Markt”,“Die Apotheke”,“Der Arzt”,“Das Supermarkt”],answer:1},
{q:“The EU emergency number is:”,options:[“999”,“911”,“110”,“112”],answer:3},
{q:”‘Ich fühle mich nicht gut’ — why ‘mich’?”,options:[“It’s accusative object”,“fühlen is a reflexive verb”,“German always needs mich”,“It’s dative”],answer:1},
]
},
{ id:“weather_nature”, title:“Weather & Seasons”, emoji:“🌤️”, color:”#55EFC4”,
story:“Germans are obsessed with weather talk — it’s the national small talk. Master this and you’ll fit right in!”,
grammar:“Weather phrases use ‘Es ist’ (it is) + adjective, OR ‘Es gibt’ (there is) + noun. Temperatures in Germany are always Celsius — 20°C is a lovely summer day. 0°C = freezing.”,
cards:[
{de:“Wie ist das Wetter heute?”,en:“What’s the weather like today?”,example:“Wie ist das Wetter heute? — Sonnig und warm!”,phonetic:“vee ist das VET-er HOY-teh”,tip:“bei euch = where you are (in conversation)”},
{de:“Es ist sonnig. / Es ist bewölkt. / Es ist bedeckt.”,en:“It’s sunny. / cloudy. / overcast.”,example:“Es ist leider sehr bewölkt heute.”,phonetic:“ZON-ikh / beh-VÖLKT / beh-DEKT”,tip:“leider = unfortunately — Germans use it often!”},
{de:“Es regnet. / Es schneit. / Es hagelt.”,en:“It’s raining. / snowing. / hailing.”,example:“Es regnet! Hast du einen Regenschirm?”,phonetic:“es RAYG-net / shnayt / HAH-gelt”,tip:“Regenschirm = umbrella (Regen = rain, Schirm = screen/shield)”},
{de:“Es ist windig. / stürmisch. / neblig.”,en:“It’s windy. / stormy. / foggy.”,example:“Im November ist es oft neblig in Hamburg.”,phonetic:“VIN-dikh / SHTÜR-mish / NAYB-likh”,tip:“Hamburg is famous for its weather!”},
{de:“warm / heiß / mild / kühl / kalt / eiskalt”,en:“warm / hot / mild / cool / cold / ice cold”,example:“Heute sind es 34 Grad — wirklich heiß!”,phonetic:“varm / hys / milt / kühl / kalt / EYE-skalt”,tip:“wirklich = really, truly”},
{de:“der Frühling / der Sommer / der Herbst / der Winter”,en:“spring / summer / autumn / winter”,example:“Im Herbst sind die Wälder wunderschön.”,phonetic:“FRÜH-ling / ZOM-er / herpst / VIN-ter”,tip:“Wälder = forests (Wald → Wälder with umlaut)”},

{de:“die Temperatur / … Grad Celsius”,en:“temperature / … degrees Celsius”,example:“Die Temperatur beträgt heute 22 Grad.”,phonetic:“tem-peh-rah-TOOR / grahd TSEL-see-oos”,tip:“0°C = freezing, 37°C = body temperature”},

{ id:“home_rooms”, title:“Home & Living”, emoji:“🏠”, color:”#FDCB6E”,
story:“You’ve moved into a Berlin WG (shared flat). Your roommates give you the tour!”,
grammar:“German compound nouns: multiple words join into one: Schlaf+zimmer = bedroom, Kühl+schrank = fridge, Wasch+maschine = washing machine. The LAST part determines the gender: das Zimmer → das Schlafzimmer.”,
cards:[

{de:“die Küche / das Badezimmer / die Toilette”,en:“kitchen / bathroom / toilet”,example:“Die Küche ist rechts, das Bad ist links.”,phonetic:“KÜH-kheh / BAH-deh-tsim-er / twah-LET-teh”,tip:“das Bad = bathroom (short for Badezimmer)”},
{de:“das Wohnzimmer / das Schlafzimmer”,en:“living room / bedroom”,example:“Mein Schlafzimmer ist klein aber gemütlich.”,phonetic:“VOHN-tsim-er / SHLAHF-tsim-er”,tip:“gemütlich = cozy — very German concept!”},
{de:“der Flur / der Balkon / der Keller / der Garten”,en:“hallway / balcony / basement / garden”,example:“Wir haben einen kleinen Balkon.”,phonetic:“floor / bal-KON / KEL-er / GAR-ten”,tip:“Balkon is a French loanword”},
{de:“das Bett / der Schrank / der Tisch / der Stuhl”,en:“bed / wardrobe / table / chair”,example:“Der Tisch ist zu klein für vier Personen.”,phonetic:“bet / shrank / tish / shtool”,tip:“der Schreibtisch = desk (Schreib = writing)”},

],

{
id:5, title:“Woche 5”, subtitle:“Grammar Foundations”, color:”#00B894”, tier:“A1”,
lessons:[
{ id:“articles_gender”, title:“Articles & Gender”, emoji:“🧬”, color:”#00B894”,
story:“You want to say ‘I see the man’ and ‘I buy the book’. German makes you think: which article? This week we crack the code.”,
grammar:“Every German noun has a gender: der (masc.), die (fem.), das (neuter). Learn the article WITH every noun — it’s part of the word! Key tip: -ung, -heit, -keit = ALWAYS die. -chen, -lein = ALWAYS das. -er (job) = usually der.”,
cards:[
{de:“der → masculine (der Mann, der Tisch, der Bahnhof)”,en:“der = masculine (the man, the table, the station)”,example:“Ich sehe den Mann. Der Tisch ist groß.”,phonetic:“der man / der tish / der BAHN-hohf”,tip:“About 1/3 of nouns are masculine”},
{de:“die → feminine (die Frau, die Stadt, die Wohnung)”,en:“die = feminine (the woman, the city, the apartment)”,example:“Die Stadt ist schön. Die Wohnung ist groß.”,phonetic:“dee frow / dee shtat / dee VOH-noong”,tip:”-ung ALWAYS = die. Remember it!”},
{de:“das → neuter (das Kind, das Buch, das Zimmer)”,en:“das = neuter (the child, the book, the room)”,example:“Das Kind liest das Buch.”,phonetic:“das kint / das bookh / das TSIM-er”,tip:”-chen and -lein ALWAYS = das”},
{de:“ein / eine / ein — indefinite article”,en:“a/an — a man / a woman / a child”,example:“Ich habe einen Bruder und eine Schwester.”,phonetic:“yne / EYE-neh / yne”,tip:“Masculine accusative: ein → einen!”},
{de:“kein / keine / kein — negative article”,en:“no/not a — no man / no woman / no child”,example:“Ich habe keine Zeit. Das ist kein Problem.”,phonetic:“kyne / KY-neh / kyne”,tip:“kein follows the ein-pattern but negates”},
{de:“Tips for gender: -ung, -heit, -keit → die”,en:“Suffixes that signal feminine (die)”,example:“die Wohnung, die Gesundheit, die Freundlichkeit”,phonetic:“dee VOH-noong / geh-ZOONT-hyte / FROYNT-likh-kyte”,tip:“These THREE suffixes = always die!”},
{de:“Tips for gender: -chen, -lein → das”,en:“Diminutive suffixes = always neuter (das)”,example:“das Mädchen, das Brötchen, das Fräulein”,phonetic:“das MAYT-khen / BRÖT-khen / FROI-line”,tip:“Das Mädchen (girl) is neuter — German logic!”},
{de:“Tips for gender: -er (people/jobs) → der”,en:“Job/agent nouns with -er = usually masculine”,example:“der Lehrer, der Fahrer, der Computer”,phonetic:“der LAY-rer / FAH-rer / kom-PYOO-ter”,tip:“Exception: die Mutter (the -er of ‘mother’)”},
{de:“der Plural: die (for ALL genders)”,en:“Plural article: always ‘die’”,example:“der Mann → die Männer, das Kind → die Kinder”,phonetic:“dee MEN-er / dee KIN-der”,tip:“Plural is ALWAYS ‘die’ — one rule to rule them all!”},
{de:“Akkusativ Maskulinum: der → den, ein → einen”,en:“Accusative masculine: der→den, ein→einen”,example:“Ich sehe den Mann. Ich kaufe einen Apfel.”,phonetic:“den man / EYE-nen AP-fel”,tip:“ONLY masculine changes in accusative!”},
{de:“nicht + Verb / kein + Nomen”,en:“not + verb / no + noun — two ways to negate”,example:“Ich trinke nicht. Ich habe kein Geld.”,phonetic:“nikht / kyne GELT”,tip:“nicht negates verbs/adjectives, kein negates nouns”},
{de:“Was ist das? / Das ist ein/eine…”,en:“What is this? / This is a…”,example:“Was ist das? — Das ist ein Hund.”,phonetic:“vas ist das / das ist yne/EYE-neh”,tip:“Hund = dog — useful word to know!”},
],
quiz:[
{q:”‘Wohnung’ is which gender?”,options:[“Der”,“Die”,“Das”,“Depends”],answer:1},
{q:”‘Das Mädchen’ (girl) is which gender?”,options:[“Feminine”,“Masculine”,“Neuter”,“Changes”],answer:2},
{q:“Accusative of ‘ich kaufe ___ Apfel’:”,options:[“der”,“die”,“den”,“dem”],answer:2},
{q:”‘nicht’ vs ‘kein’ — ‘kein’ negates:”,options:[“Verbs”,“Adjectives”,“Nouns”,“Sentences”],answer:2},
]
},
{ id:“sentence_structure”, title:“Sentence Structure”, emoji:“📐”, color:”#6C5CE7”,
story:“A German sentence feels like a puzzle — the verb always wants to be second. Once you see the rule, everything clicks!”,
grammar:“VERB SECOND RULE: In German main clauses, the verb is ALWAYS in position 2, no matter what comes first. ‘Heute gehe ich…’ not ‘Heute ich gehe’. This is called the V2 rule (Verbzweitstellung).”,
cards:[
{de:“Das Verb steht immer auf Position 2!”,en:“The verb is ALWAYS in position 2!”,example:“Heute gehe ich in die Stadt. Morgen fahre ich.”,phonetic:“das ferp shtayt IM-er owf po-zee-TSYOHN TSVY”,tip:“Even if time/place comes first, verb is #2”},
{de:“Ich gehe heute ins Kino.”,en:“I am going to the cinema today.”,example:“Ich gehe heute ins Kino. / Heute gehe ich ins Kino.”,phonetic:“ikh GAY-eh HOY-teh ins KEE-noh”,tip:“Both correct — just swapping the front element”},
{de:“Fragen: Verb auf Position 1!”,en:“Questions: verb in position 1!”,example:“Gehst du heute ins Kino?”,phonetic:“gayst doo HOY-teh ins KEE-noh”,tip:“Yes/no questions: verb comes FIRST”},
{de:“W-Fragen: W-Wort + Verb + Subjekt”,en:“W-questions: question word + verb + subject”,example:“Wohin gehst du? Was machst du?”,phonetic:“VOH-hin gayst doo / vas makhst doo”,tip:“W-words: wer, was, wo, wohin, woher, wann, wie”},
{de:“wer / was / wo / wann / wie / warum”,en:“who / what / where / when / how / why”,example:“Wer bist du? Wo wohnst du? Warum lernst du?”,phonetic:“ver / vas / voh / van / vee / vah-ROOM”,tip:“Master these 6 for any conversation!”},
{de:“Trennbare Verben: Präfix ans Ende!”,en:“Separable verbs: prefix to the END!”,example:“Ich stehe um 7 auf. (aufstehen = to get up)”,phonetic:“ikh SHTAY-eh oom zeeben OWF”,tip:“aufstehen, anrufen, einladen, aufmachen…”},
{de:“Modalverben: Modal + Infinitiv am Ende”,en:“Modal verbs: modal + infinitive at the end”,example:“Ich muss heute lernen. Kannst du kommen?”,phonetic:“ikh moos HOY-teh LER-nen”,tip:“6 modals push the infinitive to the last position”},
{de:“Negation mit ‘nicht’: nach dem Verb”,en:“Negation with ‘nicht’: after the verb”,example:“Ich gehe nicht. Ich bin nicht müde.”,phonetic:“ikh GAY-eh nikht”,tip:”‘nicht’ usually goes at the end or before the targeted word”},
{de:“Akkusativ-Ergänzung: nach dem Verb”,en:“Accusative object: after the verb”,example:“Ich kaufe einen Apfel. Ich sehe die Frau.”,phonetic:“ikh KOW-feh EYE-nen AP-fel”,tip:“Direct object follows the verb in most cases”},
{de:“Zeitangaben kommen früh im Satz”,en:“Time expressions come early in the sentence”,example:“Gestern habe ich Pizza gegessen.”,phonetic:“GES-tern HAH-beh ikh PIT-sah geh-ES-en”,tip:“Time words like gestern/heute/morgen love position 1”},
{de:“Es gibt + Akkusativ”,en:“There is / there are + accusative”,example:“Es gibt einen Park in der Nähe.”,phonetic:“es gibt EYE-nen park in der NAY-eh”,tip:“Es gibt = there is/are (like Spanish hay)”},
{de:“Und / aber / oder — keine Veränderung!”,en:“And / but / or — no word order change!”,example:“Ich lerne Deutsch und ich übe jeden Tag.”,phonetic:“oont / AH-ber / OH-der”,tip:“These 3 keep normal V2 word order”},
],
quiz:[
{q:”‘Today I go to the cinema’ — German word order:”,options:[“Heute ich gehe ins Kino”,“Heute gehe ich ins Kino”,“Ich heute gehe ins Kino”,“Gehe heute ich ins Kino”],answer:1},
{q:“Separable verb ‘aufstehen’ — I get up at 7:”,options:[“Ich aufstehe um 7”,“Ich stehe um 7 auf”,“Ich stehe auf um 7”,“Auf stehe ich um 7”],answer:1},
{q:“Yes/No question word order: verb in position:”,options:[“1”,“2”,“3”,“Last”],answer:0},
{q:”‘Es gibt’ is used to express:”,options:[“I have”,“There is/are”,“I want”,“I need”],answer:1},
]
},
{ id:“past_present”, title:“Present & Perfect Tense”, emoji:“⏱️”, color:”#FDCB6E”,
story:“Your German roommate asks ‘Was hast du heute gemacht?’ — time to talk about the past!”,
grammar:“German spoken past = Perfekt (haben/sein + Partizip II). The Partizip II of WEAK (regular) verbs: ge- + stem + -t (gemacht, gelernt, gespielt). STRONG (irregular) verbs change the stem: gegessen, getrunken, gegangen.”,
cards:[
{de:“Perfekt mit haben: Ich habe … gemacht”,en:“Perfect with haben: I did / have done”,example:“Ich habe heute Sport gemacht und Deutsch gelernt.”,phonetic:“ikh HAH-beh … geh-MAKHT”,tip:“Regular weak verbs: ge- + stem + -t”},
{de:“Perfekt mit sein: Ich bin … gegangen”,en:“Perfect with sein: I went / have gone”,example:“Ich bin ins Kino gegangen und heimgefahren.”,phonetic:“ikh bin … geh-GAN-gen”,tip:“Motion and change verbs use sein!”},
{de:“gegessen / getrunken / geschlafen (stark)”,en:“ate / drank / slept — irregular participles”,example:“Ich habe Pizza gegessen und Wein getrunken.”,phonetic:“geh-ES-en / geh-TROON-ken / geh-SHLAH-fen”,tip:“Strong verbs: ge- + changed stem + -en”},
{de:“gearbeitet / gelernt / gespielt / gekauft”,en:“worked / learned / played / bought (weak)”,example:“Hast du heute gearbeitet?”,phonetic:“geh-AR-by-tet / geh-LERNT / geh-SHPEELT”,tip:“Weak verbs: ge- + stem + -t — predictable!”},
{de:“gefahren / geflogen / gelaufen / geschwommen”,en:“drove / flew / ran / swam (with sein!)”,example:“Ich bin mit dem Rad gefahren.”,phonetic:“geh-FAH-ren / geh-FLOG-en / geh-LOW-fen”,tip:“fahren, fliegen, laufen, schwimmen → all use sein”},
{de:“Ich war… / Ich hatte… (Präteritum)”,en:“I was / I had (simple past — used in speech!)”,example:“Gestern war das Wetter schön. Ich hatte keine Zeit.”,phonetic:“ikh var / ikh HAT-teh”,tip:“sein and haben use Präteritum even in conversation!”},
{de:“gestern / letzte Woche / letzten Monat”,en:“yesterday / last week / last month”,example:“Letzte Woche war ich in Wien.”,phonetic:“GES-tern / LETS-teh VOH-kheh / LETS-ten MOH-naht”,tip:“Time words come at the start or after the subject”},
{de:“Was hast du … gemacht?”,en:“What did you do …?”,example:“Was hast du am Wochenende gemacht?”,phonetic:“vas hast doo … geh-MAKHT”,tip:“am Wochenende = at/on the weekend”},
{de:“Ich habe nichts Besonderes gemacht.”,en:“I didn’t do anything special.”,example:“Na, wie war dein Tag? — Nichts Besonderes.”,phonetic:“ikh HAH-beh nikhts beh-ZON-deh-res geh-MAKHT”,tip:“Na = well/so — very German conversational filler”},
{de:“Das war toll / interessant / langweilig.”,en:“That was great / interesting / boring.”,example:“Das Konzert war absolut toll!”,phonetic:“das var tol / in-teh-reh-SANT / LANG-vy-likh”,tip:“interesting = interessant (similar to English!)”},
{de:“Ich habe … gekauft / bestellt / gegessen.”,en:“I bought / ordered / ate …”,example:“Ich habe einen neuen Laptop gekauft.”,phonetic:“geh-KOWFT / beh-SHTELT / geh-ES-en”,tip:“gekauft = bought, bestellt = ordered”},
{de:“Wann? Wie oft? Wie lange?”,en:“When? How often? How long?”,example:“Ich war zwei Stunden im Museum.”,phonetic:“van / vee oft / vee LAN-geh”,tip:“Zwei Stunden = two hours, eine Stunde = one hour”},
],
quiz:[
{q:“How do you say ‘I ate pizza’?”,options:[“Ich esse Pizza”,“Ich habe Pizza gegessen”,“Ich bin Pizza gegangen”,“Ich aß Pizza”],answer:1},

]
},
],

{
id:6, title:“Woche 6”, subtitle:“Real German & A1 Mastery”, color:”#FF7675”, tier:“A1”,
lessons:[
{ id:“modal_verbs_a1”, title:“Modal Verbs”, emoji:“🎛️”, color:”#FF7675”,
story:“Modal verbs are everywhere in German. They change the ‘flavour’ of what you’re doing — ability, permission, obligation, desire.”,
grammar:“6 modal verbs: können (can), müssen (must), dürfen (may), sollen (should), wollen (want), mögen (like). They are irregular — memorize each conjugation! Modal = position 2, infinitive = position LAST.”,
cards:[
{de:“können: ich kann / du kannst / er kann”,en:“can/be able to”,example:“Ich kann Deutsch sprechen! Kannst du kochen?”,phonetic:“KÖN-en / ikh kan / doo kanst / er kan”,tip:“Ability AND permission in informal contexts”},
{de:“müssen: ich muss / du musst / er muss”,en:“must/have to”,example:“Ich muss morgen früh aufstehen.”,phonetic:“MÜS-en / ikh moos / doo moost / er moos”,tip:“NICHT müssen = don’t HAVE to (not forbidden!)”},
{de:“dürfen: ich darf / du darfst / er darf”,en:“may/be allowed to”,example:“Darf ich hier parken? — Nein, verboten!”,phonetic:“DÜRF-en / ikh darf / doo darfst / er darf”,tip:“NICHT dürfen = must NOT (forbidden!)”},
{de:“sollen: ich soll / du sollst / er soll”,en:“should/supposed to (external obligation)”,example:“Du sollst jetzt schlafen gehen!”,phonetic:“ZOL-en / ikh zol / doo zolst / er zol”,tip:“Someone ELSE wants you to do it”},
{de:“wollen: ich will / du willst / er will”,en:“want to (strong intention)”,example:“Ich will Arzt werden! Was willst du werden?”,phonetic:“VOL-en / ikh vil / doo vilst / er vil”,tip:“Strong will — NOT polite. Use möchten instead!”},

id:8, title:“Woche 8”, subtitle:“Real Conversations”, color:”#E17055”, tier:“A2”,
lessons:[
{ id:“opinions_a2”, title:“Opinions & Discussions”, emoji:“💬”, color:”#E17055”,
story:“Germans love a good debate. Your friend wants to discuss ‘Berlin vs. Munich — which is better?’ Time to hold your own!”,
grammar:“Opinion phrases with ‘dass’ send the verb to the END: ‘Ich glaube, dass Berlin cool ist.’ The verb ‘ist’ jumps to last position. This is called the Nebensatz (subordinate clause) rule.”,
cards:[
{de:“Ich denke / glaube / finde, dass…”,en:“I think / believe / find that…”,example:“Ich glaube, dass Berlin cooler als München ist.”,phonetic:“ikh DEN-keh / GLOW-beh / FIN-deh das”,tip:“dass clause = verb goes LAST”},
{de:“Meiner Meinung nach…”,en:“In my opinion…”,example:“Meiner Meinung nach ist das zu teuer.”,phonetic:“MY-ner MY-noong nakh”,tip:“Sounds very native — impress Germans with this!”},
{de:“Das stimmt. / Das stimmt nicht.”,en:“That’s true. / That’s not true.”,example:“Das stimmt absolut! / Das stimmt überhaupt nicht!”,phonetic:“das shtimmt / das shtimmt nikht”,tip:“überhaupt nicht = not at all”},
{de:“Ich stimme dir zu. / Ich bin anderer Meinung.”,en:“I agree. / I have a different opinion.”,example:“Da stimme ich dir voll zu!”,phonetic:“ikh SHTIM-eh deer tsoo / AN-deh-rer MY-noong”,tip:“voll = completely (colloquial)”},
{de:“Einerseits… andererseits…”,en:“On one hand… on the other hand…”,example:“Einerseits ist Berlin günstig, andererseits laut.”,phonetic:“EYE-ner-zyts / AN-der-er-zyts”,tip:“Classic debate structure — very useful!”},
{de:“Es kommt darauf an.”,en:“It depends.”,example:“Ist Deutschland teuer? — Es kommt darauf an.”,phonetic:“es kommt dah-ROWF an”,tip:“The universal diplomatic non-answer!”},
{de:“Ich bin dafür. / Ich bin dagegen.”,en:“I’m for it. / I’m against it.”,example:“Bist du dafür oder dagegen?”,phonetic:“ikh bin dah-FÜR / dah-GAY-gen”,tip:“dafür/dagegen = great for quick positions”},
{de:“Was denkst du darüber?”,en:“What do you think about it?”,example:“Was denkst du eigentlich darüber?”,phonetic:“vas denkst doo dah-RÜH-ber”,tip:“darüber = about it/that, eigentlich = actually”},
{de:“Das hängt davon ab, ob…”,en:“That depends on whether…”,example:“Das hängt davon ab, ob das Wetter gut ist.”,phonetic:“das hengt dah-FON ap op”,tip:“ob = whether (indirect yes/no)”},
{de:“weil (because) → Verb ans Ende!”,en:“because → verb to the end!”,example:“Ich lerne Deutsch, weil es sehr interessant ist.”,phonetic:“vyle … ist”,tip:“weil is the most used subordinating conjunction”},
{de:“obwohl (although) → Verb ans Ende!”,en:“although → verb to the end!”,example:“Obwohl es regnet, gehe ich spazieren.”,phonetic:“op-VOHL … GAY-eh”,tip:“The obwohl clause can come first!”},
{de:“denn (because/for) — KEIN Verbletztstellung!”,en:“because/for — does NOT send verb last!”,example:“Ich lerne Deutsch, denn es macht mir Spaß.”,phonetic:“den … makht meer shpahs”,tip:“denn ≠ weil: denn keeps normal V2 order!”},
],
quiz:[
{q:”‘Meiner Meinung nach’ means:”,options:[“I think that”,“According to you”,“In my opinion”,“It depends”],answer:2},
{q:“After ‘dass’, the verb goes:”,options:[“First”,“Second”,“Third”,“Last”],answer:3},
{q:”‘weil’ vs ‘denn’ — which sends verb to end?”,options:[“denn”,“weil”,“Both”,“Neither”],answer:1},
{q:”‘Es kommt darauf an’ =”,options:[“It is expensive”,“It depends”,“I agree”,“I’m not sure”],answer:1},
]
},
{ id:“future_conditionals”, title:“Future & Conditionals”, emoji:“🔮”, color:”#00CEC9”,
story:“Your German friend asks ‘Was hast du vor?’ What are your plans and dreams?”,
grammar:“Future: present tense + time word (‘Morgen gehe ich…’) OR werden + infinitive. Konjunktiv II (subjunctive): würde + infinitive for hypotheticals. könnte/wäre/hätte = could/would be/would have.”,
cards:[
{de:“Ich werde… (Futur I)”,en:“I will… (Future I)”,example:“Ich werde nächstes Jahr nach Berlin ziehen.”,phonetic:“ikh VER-deh … (tsoo-TSEE-en)”,tip:“werden + infinitive at end of clause”},
{de:“Ich möchte / will / plane zu…”,en:“I’d like to / want to / plan to…”,example:“Ich möchte Deutsch fließend sprechen.”,phonetic:“ikh MÖSH-teh / vil / PLAH-neh tsoo”,tip:“möchten = polite, wollen = stronger”},
{de:“nächste Woche / nächsten Monat / nächstes Jahr”,en:“next week / month / year”,example:“Nächstes Jahr reise ich nach Japan.”,phonetic:“NEKHS-teh VOH-kheh / NEKHS-ten MOH-naht / NEKHS-tes yahr”,tip:“nächst- follows adjective endings”},
{de:“Ich würde gerne… (Konjunktiv II)”,en:“I would like to… (subjunctive)”,example:“Ich würde gerne nach Neuseeland reisen.”,phonetic:“ikh VÜR-deh GER-neh”,tip:“würde = would — most common subjunctive form”},
{de:“Wenn ich könnte, würde ich…”,en:“If I could, I would…”,example:“Wenn ich könnte, würde ich jeden Tag reisen.”,phonetic:“ven ikh KÖN-teh VÜR-deh ikh”,tip:“könnte = could (Konjunktiv of können)”},
{de:“Das wäre schön! / Ich wäre gerne…”,en:“That would be nice! / I’d like to be…”,example:“Ich wäre gerne Musiker. Das wäre so schön!”,phonetic:“das VAY-reh shön / ikh VAY-reh GER-neh”,tip:“wäre = would be (Konjunktiv of sein)”},
{de:“Ich hätte gerne… / Ich hätte lieber…”,en:“I would like to have… / I’d prefer…”,example:“Ich hätte gerne mehr Zeit!”,phonetic:“ikh HET-teh GER-neh / LEE-ber”,tip:“hätte = would have (Konjunktiv of haben)”},
{de:“Du solltest / müsstest… (Rat geben)”,en:“You should / ought to… (giving advice)”,example:“Du solltest mehr Wasser trinken.”,phonetic:“doo ZOL-test / MÜS-test”,tip:“Konjunktiv II of modals = polite advice”},
{de:“An deiner Stelle würde ich…”,en:“If I were you, I would…”,example:“An deiner Stelle würde ich das nicht riskieren.”,phonetic:“an DY-ner SHTEL-leh VÜR-deh ikh”,tip:“Great diplomatic way to give advice”},
{de:“Ich hoffe, dass… / Ich wünsche mir…”,en:“I hope that… / I wish for…”,example:“Ich hoffe, dass das Wetter besser wird.”,phonetic:“ikh HOF-eh das / ikh VÜN-sheh meer”,tip:“wünschen + sich = reflexive with dative”},
{de:“Mal sehen! / Wir werden sehen!”,en:“We’ll see! (non-commitment)”,example:“Wirst du kommen? — Mal sehen!”,phonetic:“mal ZAY-en / veer VER-den ZAY-en”,tip:“Typical German non-commitment expression!”},
{de:“In fünf Jahren möchte ich… sein.”,en:“In five years I’d like to be…”,example:“In fünf Jahren möchte ich fließend Deutsch sprechen.”,phonetic:“in fühnf YAH-ren MÖSH-teh ikh”,tip:“fließend = fluently — your ultimate goal!”},
],
quiz:[
{q:“How do you say ‘I will go to Hamburg’?”,options:[“Ich bin nach Hamburg gegangen”,“Ich gehe nach Hamburg”,“Ich werde nach Hamburg fahren”,“Ich war in Hamburg”],answer:2},
{q:”‘Das wäre toll!’ means:”,options:[“That is great!”,“That was great!”,“That would be great!”,“That will be great!”],answer:2},

{q:”‘Mal sehen’ expresses:”,options:[“Certainty”,“Refusal”,“Non-commitment”,“Enthusiasm”],answer:2},
]

{ id:“work_formal”, title:“Work, Writing & Formal German”, emoji:“💼”, color:”#A29BFE”,
story:“You want to write a German email, apply for a job, or navigate bureaucracy. Real-world formal German!”,
grammar:“Formal letters start with ‘Sehr geehrte/r…’ and end with ‘Mit freundlichen Grüßen’. Formal emails use ‘Sie’. Konjunktiv I is used in reported speech: ‘Er sagt, er sei krank.’ You’ll see this in news articles.”,

{
id:9, title:“Woche 9”, subtitle:“Fluency Builder”, color:”#6C5CE7”, tier:“A2”,
lessons:[
{ id:“complex_grammar”, title:“Complex Sentences”, emoji:“🔗”, color:”#6C5CE7”,
story:“Simple sentences are fine. But linking ideas is what makes you sound truly fluent. Elevate your German!”,
grammar:“Subordinating conjunctions (weil, obwohl, dass, wenn, bevor, nachdem, während) → verb to END. Coordinating conjunctions (und, aber, oder, denn, sondern) → NO word order change. Relative clauses: ‘Das Buch, das ich lese…’ — pronoun matches article.”,
cards:[
{de:“damit / sodass (so that / such that)”,en:“so that (purpose/result)”,example:“Ich lerne Deutsch, damit ich kommunizieren kann.”,phonetic:“dah-MIT / zoh-DAS”,tip:“damit = intentional purpose, sodass = result”},
{de:“bevor / nachdem / während (time)”,en:“before / after / while”,example:“Bevor ich schlafe, lese ich 30 Minuten.”,phonetic:“beh-FOR / NAKH-dem / VEH-rent”,tip:“All send verb to end! nachdem → Perfekt tense”},
{de:“je… desto… (the more… the more…)”,en:“the more X, the more Y”,example:“Je mehr ich übe, desto besser werde ich.”,phonetic:“yeh … DES-toh”,tip:“POWERFUL structure — impresses native speakers!”},
{de:“nicht nur… sondern auch…”,en:“not only… but also…”,example:“Ich spreche nicht nur Deutsch, sondern auch Spanisch.”,phonetic:“nikht noor … ZON-dern owkh”,tip:“sondern = but rather (corrects negation)”},
{de:“entweder… oder… / weder… noch…”,en:“either… or… / neither… nor…”,example:“Entweder Kaffee oder Tee?”,phonetic:“ent-VAY-der … OH-der / VAY-der … nokh”,tip:“weder… noch = neither… nor (double negative)”},
{de:“trotzdem / dennoch / jedoch (contrast)”,en:“nevertheless / nonetheless / however”,example:“Es ist schwierig. Trotzdem übe ich jeden Tag!”,phonetic:“TROTS-dem / DEN-nokh / YEH-dokh”,tip:“These don’t change word order (Konjunktivadverbien)”},
{de:“Relativsatz: Das Buch, das ich lese…”,en:“Relative clause: The book that I’m reading…”,example:“Der Mann, der dort steht, ist mein Bruder.”,phonetic:“das bookh das ikh LAY-zeh”,tip:“Relative pronoun = matches article of the noun”},
{de:“Indirekter Fragesatz: ob / wann / was / wo”,en:“Indirect question: whether / when / what / where”,example:“Ich weiß nicht, ob das stimmt.”,phonetic:“ikh vys nikht op das shtimmt”,tip:“Indirect questions → verb to end!”},
{de:“als (when — single past event)”,en:“when (single past event) vs wenn (repeated/future)”,example:“Als ich Kind war, wohnte ich in München.”,phonetic:“als ikh kint var”,tip:“als = single past moment, wenn = repeated or future”},
{de:“Passiv: Das Buch wird gelesen.”,en:“Passive voice: The book is being read.”,example:“Das Formular wird ausgefüllt.”,phonetic:“das bookh virt geh-LAY-zen”,tip:“werden + Partizip II = Passiv. Often used in formal German”},
{de:“lassen + Infinitiv (to have/let someone do)”,en:“to have done / to let someone do”,example:“Ich lasse das Auto reparieren.”,phonetic:“ikh LAS-eh das ow-TOH reh-pah-REER-en”,tip:“lassen = to let/have — very common in daily German”},
{de:“Wortstellung: TeKaMoLo”,en:“Time-Cause-Manner-Place word order”,example:“Ich fahre morgen wegen der Arbeit schnell nach Berlin.”,phonetic:“TSEH-kah-moh-loh”,tip:“TeKaMoLo: Time first, Place last — the order of adverbials”},
],
quiz:[
{q:“Complete: ‘Ich lerne, weil es ___ ist’”,options:[“ist interessant”,“interessant ist”,“interessant war”,“es interessant”],answer:1},
{q:”‘Je mehr ich lerne, desto…’ means:”,options:[“The more I learn, the…”,“When I learn more…”,“Although I learn more…”,“Because I learn more…”],answer:0},

{ id:“prepositions_a2”, title:“Prepositions Mastery”, emoji:“🧭”, color:”#74B9FF”,
story:“Prepositions are the glue of German — and where most mistakes happen. Let’s nail them once and for all!”,
grammar:“Two-way prepositions (Wechselpräpositionen): in, an, auf, über, unter, vor, hinter, neben, zwischen. They take ACCUSATIVE for movement (wohin?), DATIVE for location (wo?). A simple test: can you answer ‘wohin?’ → Akkusativ!”,
cards:[
{de:“auf dem Tisch (Dat.) / auf den Tisch (Akk.)”,en:“on the table (location) / onto the table (movement)”,example:“Das Buch liegt auf dem Tisch. Leg es auf den Tisch.”,phonetic:“owf dem TISH / owf den TISH”,tip:“liegt (is lying) = Dativ; leg (put) = Akkusativ”},
{de:“in der Stadt (Dat.) / in die Stadt (Akk.)”,en:“in the city (location) / into the city (movement)”,example:“Ich bin in der Stadt. / Ich gehe in die Stadt.”,phonetic:“in der shtaht / in dee shtaht”,tip:“THE classic two-way example — memorize it!”},
{de:“an der Wand (Dat.) / an die Wand (Akk.)”,en:“on the wall (where) / onto the wall (where to)”,example:“Das Bild hängt an der Wand.”,phonetic:“an der vant / an dee vant”,tip:“hängen (hanging) = two meanings: active vs. state”},
{de:“vor / hinter / neben / zwischen + Dat/Akk”,en:“in front of / behind / next to / between”,example:“Das Café ist neben dem Bahnhof.”,phonetic:“for / HIN-ter / NAY-ben / TSVI-shen”,tip:“neben = next to — very useful!”},
{de:“durch / für / gegen / ohne / um → AKKUSATIV”,en:“through / for / against / without / around → ACCUSATIVE”,example:“Ich gehe durch den Park. Das ist für dich.”,phonetic:“dooRKH / führ / GAY-gen / OH-neh / oom”,tip:“These 5 ALWAYS take Accusative!”},
{de:“aus / bei / mit / nach / seit / von / zu → DATIV”,en:“from / at / with / to / since / of / to → DATIVE”,example:“Ich komme aus der Schweiz. Ich fahre mit dem Zug.”,phonetic:“ows / by / mit / nakh / zyte / fon / tsoo”,tip:“These 7 ALWAYS take Dative!”},
{de:“gegenüber + Dativ (across from)”,en:“across from / opposite”,example:“Das Hotel ist gegenüber dem Bahnhof.”,phonetic:“geh-gen-Ü-ber dem BAHN-hof”,tip:“Can come AFTER the noun: dem Bahnhof gegenüber”},
{de:“wegen / trotz + Genitiv”,en:“because of / despite + genitive”,example:“Wegen des Regens bin ich zu Hause geblieben.”,phonetic:“VAY-gen / trots + des/der”,tip:“Genitiv: des (m/n) + noun-s, der (f)”},
{de:“innerhalb / außerhalb + Genitiv”,en:“inside / outside (of) + genitive”,example:“Außerhalb der Stadt ist es ruhiger.”,phonetic:“IN-er-halp / OW-ser-halp + der shtaht”,tip:“Genitive used for spatial relationships”},
{de:“bis zu / bis nach / bis in”,en:“until / up to / all the way to”,example:“Wir fahren bis nach Berlin.”,phonetic:“bis tsoo / bis nakh / bis in”,tip:“bis nach = for cities, bis zu = for everything else”},
{de:“statt + Genitiv (instead of)”,en:“instead of + genitive”,example:“Statt des Kaffees trinke ich Tee.”,phonetic:“shtat + des KAF-ays”,tip:“statt des = instead of the (genitive masculine)”},
{de:“anstatt zu + Infinitiv”,en:“instead of + -ing (infinitive construction)”,example:“Anstatt zu schlafen, lerne ich Deutsch.”,phonetic:“AN-shtat tsoo + in-fee-nee-TEEF”,tip:“Infinitiv construction: zu + infinitive at end”},

function srsKey(lessonId, cardIdx) { return lessonId + “_” + cardIdx; }
function srsNext(card, correct) {
const ef = Math.max(1.3, (card.ef||2.5) + (correct ? 0.1 : -0.3));
const reps = correct ? (card.reps||0)+1 : 0;
const interval = correct ? (reps <= 1 ? 1 : reps === 2 ? 3 : Math.round((card.interval||1)*ef)) : 0.5;
const due = Date.now() + interval*24*60*60*1000;
return { ef, reps, interval, due };
}
function srsDue(srsData, lessonId, cardIdx) {
const k = srsKey(lessonId, cardIdx);
if (!srsData[k]) return true; // never seen = due
return Date.now() >= srsData[k].due;
}
function getDueCards(srsData, lessons) {
const due = [];
lessons.forEach(lesson => {
lesson.cards.forEach((card, idx) => {
if (srsDue(srsData, lesson.id, idx)) due.push({ lesson, card, idx });
});
});
return due;
}

function SpeakBtn({ text, size=36, showSlow=false }) {
const [status, setStatus] = useState(“idle”);
const [slow, setSlow] = useState(false);
const ref = useRef(false);

async function handleSpeak(e, forceSlow) {
e.stopPropagation();
if (status===“speaking”) { stopAudio(); setStatus(“idle”); ref.current=false; return; }
const useSlow = forceSlow!==undefined ? forceSlow : slow;
setStatus(“speaking”); ref.current=true;
await speak(text, useSlow);
const dur = Math.max(1600, text.length*(useSlow ? 170 : 90));
setTimeout(() => { if(ref.current){setStatus(“done”);ref.current=false;setTimeout(()=>setStatus(“idle”),900);} }, dur);
}
return (
<div style={{display:“flex”,alignItems:“center”,gap:4,flexShrink:0}}>
<button onClick={handleSpeak} title={status===“speaking”?“Stop”:slow?“Listen slowly”:“Listen”} style={{
width:size,height:size,borderRadius:“50%”,
border:`1.5px solid ${status==="speaking"?"#FFD700":"#ffffff18"}`,
cursor:“pointer”,background:status===“speaking”?”#FFD700”:status===“done”?”#4ECDC420”:”#ffffff0a”,
color:status===“speaking”?”#000”:status===“done”?”#4ECDC4”:”#FFD700”,
display:“flex”,alignItems:“center”,justifyContent:“center”,
fontSize:size*0.42,transition:“all 0.2s”,
boxShadow:status===“speaking”?“0 0 16px #FFD70066”:“none”,position:“relative”,
}}>
{status===“speaking”?“⏹”:status===“done”?“✓”:“🔊”}
{status===“speaking”&&[0,1].map(i=>(
<span key={i} style={{position:“absolute”,width:size+(i+1)*12,height:size+(i+1)*12,borderRadius:“50%”,border:“1.5px solid #FFD70050”,animation:`ripple 1.1s ease-out ${i*0.35}s infinite`,pointerEvents:“none”}}/>
))}
</button>
{showSlow&&(
<button onClick={e=>{e.stopPropagation();const ns=!slow;setSlow(ns);if(status!==“speaking”)handleSpeak(e,ns);}}
style={{fontSize:10,padding:“3px 7px”,borderRadius:8,border:`1px solid ${slow?"#4ECDC4":"#ffffff15"}`,background:slow?”#4ECDC418”:“transparent”,color:slow?”#4ECDC4”:”#555”,cursor:“pointer”,fontWeight:700,whiteSpace:“nowrap”}}>
{slow?“🐢 slow”:“🐇 fast”}
</button>
)}
</div>
);
}

else if (timerActive && timeLeft === 0) { handleTimeUp(); }
return () => clearTimeout(timerRef.current);

}));
}
}, []);

const handleTouchStart = e => { touchStartX.current = e.touches[0].clientX; };
const handleTouchEnd = e => {
if (touchStartX.current === null) return;
const dx = e.changedTouches[0].clientX - touchStartX.current;
touchStartX.current = null;
if (Math.abs(dx) < 50) return;
if (!flipped) { setFlipped(true); return; }
if (dx < 0) nextCard(true);   // swipe left = knew it
if (dx > 0) nextCard(false);  // swipe right = didn’t know
};

showToast(`${amount>0?"+":""}${amount} 💎 ${reason}`, amount>0?”#4ECDC4”:”#FF6B6B”);
};

setState(s => ({…s, mistakes: [entry, …(s.mistakes||[])].slice(0,200)}));
};

}));
};

};

const handleLessonQuiz = (idx) => {

const correct = idx === q.answer;
if (!correct) logMistake(activeLesson.id, quizIndex, activeLesson.cards[quizIndex] || activeLesson.cards[0], “quiz”);
const ns = quizScore + (correct?1:0);
if (quizIndex < activeLesson.cards.length) updateSRS(activeLesson.id, quizIndex, correct);
setTimeout(() => {
if (quizIndex < activeLesson.quiz.length-1) { setQuizIndex(i=>i+1); setSelected(null); setQuizScore(ns); }
else {
const perfect = ns === activeLesson.quiz.length;
const alreadyDone = state.completedLessons[activeLesson.id];
if (!alreadyDone) addGems(GEMS_PER_LESSON+(perfect?GEMS_PERFECT:0), perfect?“perfect! ✨”:“done!”);
setState(s => ({…s, completedLessons:{…s.completedLessons,[activeLesson.id]:true}, streak:s.streak+(alreadyDone?0:1)}));
setQuizScore(ns); setScreen(“complete”);
}
}, 850);
};

const ns = listenScore + (correct?1:0);
setTimeout(() => {
if (listenIndex < listenItems.length-1) {
setListenIndex(i=>i+1); setListenSelected(null); setListenScore(ns);
setTimeout(()=>speak(listenItems[listenIndex+1]?.card.de||””,false),300);

}
}, 900);
};

                    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>
                      {days.map((d,i)=><div key={i} style={{textAlign:"center",fontSize:9,color:"#333",fontWeight:700}}>{d}</div>)}
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
                      {cells.map((c,i)=>(
                        <div key={i} style={{aspectRatio:"1",borderRadius:5,background:c.studied?"#4ECDC4":c.isToday?"#ffffff12":"#ffffff07",border:c.isToday?"1px solid #4ECDC460":"1px solid transparent",transition:"all 0.2s"}} title={c.str}/>
                      ))}
                    </div>
                  </div>
                );
              })()}
            </div>

            {/* Week progress bars */}
            {[...WEEKS_A1,...(state.a2Unlocked?WEEKS_A2:[])].map(w=>{
              const r=state.weekTestResults[w.id],dc=w.lessons.filter(l=>state.completedLessons[l.id]).length;
              return(<div key={w.id} style={{background:"#0d0d1a",border:"1px solid #1a1a2e",borderRadius:13,padding:"11px 14px",marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <div style={{width:7,height:7,borderRadius:"50%",background:w.color}}/>
                    <span style={{fontWeight:800,fontSize:12}}>{w.title}</span>
                    <span style={{color:"#555",fontSize:11}}>{w.subtitle}</span>
                  </div>
                  {r?<span style={{fontSize:11,fontWeight:800,color:r.passed?"#4ECDC4":"#FF6B6B"}}>{r.passed?"✓":"✗"} {r.score}/10</span>:<span style={{fontSize:11,color:"#333"}}>{state.weekUnlocked[w.id]?"":"🔒"}</span>}
                </div>
                <div style={{height:4,background:"#ffffff08",borderRadius:99,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${(dc/w.lessons.length)*100}%`,background:`linear-gradient(90deg,${w.color},${w.color}66)`,borderRadius:99,transition:"width 0.5s"}}/>
                </div>
                <div style={{fontSize:10,color:"#333",marginTop:3}}>{dc}/{w.lessons.length} lessons · {w.lessons.reduce((a,l)=>a+l.cards.length,0)} cards</div>
              </div>);
            })}
          </div>
        )}
      </>
    )}

    {/* ══════════════════ LESSON CARDS ══════════════════ */}
    {screen==="lesson"&&(activeLesson||cardMode==="srs")&&(()=>{
      const isSRS = cardMode==="srs";
      const isReverse = cardMode==="reverse";
      const currentCard = isSRS ? cardQueue[cardIndex]?.card : activeLesson?.cards[cardIndex];
      const currentLesson = isSRS ? cardQueue[cardIndex]?.lesson : activeLesson;
      const currentIdx = isSRS ? cardQueue[cardIndex]?.idx : cardIndex;
      const total = isSRS ? cardQueue.length : activeLesson?.cards.length;
      if (!currentCard) return null;
      const lessonColor = currentLesson?.color || "#4ECDC4";

      return(
        <div style={{paddingTop:8,animation:"popIn 0.3s ease"}}>
          {/* Mode badge */}
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
            {isSRS&&<span style={{fontSize:11,background:"#FFD70020",color:"#FFD700",padding:"3px 10px",borderRadius:20,fontWeight:800}}>🔁 SRS Review</span>}
            {isReverse&&<span style={{fontSize:11,background:"#6C5CE720",color:"#A29BFE",padding:"3px 10px",borderRadius:20,fontWeight:800}}>↩️ Reverse: EN→DE</span>}
            {!isSRS&&!isReverse&&<span style={{fontSize:11,background:`${lessonColor}18`,color:lessonColor,padding:"3px 10px",borderRadius:20,fontWeight:800}}>{currentLesson?.title}</span>}
          </div>

          {/* Story + Grammar (normal mode only) */}
          {!isSRS&&activeLesson?.story&&(
            <div style={{background:`${lessonColor}0e`,border:`1px solid ${lessonColor}20`,borderRadius:12,padding:"9px 13px",marginBottom:10}}>
              <div style={{fontSize:11,color:"#888",fontStyle:"italic",lineHeight:1.6,marginBottom:activeLesson.grammar?5:0}}>📖 {activeLesson.story}</div>
              {activeLesson.grammar&&(
                <>
                  <button onClick={()=>setShowGrammar(g=>!g)} style={{fontSize:10,color:lessonColor,background:"transparent",border:`1px solid ${lessonColor}35`,borderRadius:7,padding:"2px 9px",cursor:"pointer",fontWeight:700}}>
                    {showGrammar?"▲ Hide grammar":"▼ Grammar note"}
                  </button>
                  {showGrammar&&<div style={{marginTop:7,fontSize:11,color:"#bbb",lineHeight:1.7,background:"#ffffff06",borderRadius:8,padding:"7px 11px",animation:"slideIn 0.2s ease"}}>📚 {activeLesson.grammar}</div>}
                </>
              )}
            </div>
          )}

          {/* Progress bar */}
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <div style={{flex:1,height:4,background:"#ffffff0d",borderRadius:99,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${(cardIndex/total)*100}%`,background:lessonColor,borderRadius:99,transition:"width 0.3s"}}/>
            </div>
            <span style={{fontSize:10,color:"#444",fontWeight:700,minWidth:36,textAlign:"right"}}>{cardIndex+1}/{total}</span>
          </div>

          {/* FLASHCARD — touch/swipe enabled */}
          <div
            onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}
            onClick={()=>setFlipped(f=>!f)}
            style={{
              background:flipped?`${lessonColor}0e`:"#0d0d1a",
              border:`2px solid ${flipped?lessonColor+"40":"#1a1a2e"}`,
              borderRadius:22,padding:"26px 20px",minHeight:270,cursor:"pointer",
              display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
              textAlign:"center",gap:10,transition:"all 0.2s",
              animation:"flipCard 0.2s ease",userSelect:"none",
              boxShadow:flipped?`0 0 45px ${lessonColor}10`:"0 8px 40px #00000055",
            }}>
            {!flipped?(
              <>
                <div style={{fontSize:9,color:"#333",letterSpacing:3,textTransform:"uppercase"}}>{isReverse?"English":"Deutsch"}</div>
                <div style={{fontSize:28,fontWeight:900,color:"#fff",lineHeight:1.35}}>{isReverse?currentCard.en:currentCard.de}</div>
                {!isReverse&&currentCard.phonetic&&<div style={{fontSize:11,color:"#333",fontStyle:"italic"}}>/{currentCard.phonetic}/</div>}
                {!isReverse&&<div style={{marginTop:4}}><SpeakBtn text={currentCard.de} size={38} showSlow={true}/></div>}
                <div style={{fontSize:10,color:"#222",marginTop:4}}>{isSRS?"tap · swipe left = knew it · swipe right = missed it":"tap to reveal"}</div>
              </>
            ):(
              <>
                <div style={{fontSize:9,color:lessonColor,letterSpacing:3,textTransform:"uppercase",fontWeight:800}}>{isReverse?"Deutsch":"English"}</div>
                <div style={{fontSize:21,fontWeight:900,color:"#fff",lineHeight:1.4}}>{isReverse?currentCard.de:currentCard.en}</div>
                {isReverse&&currentCard.phonetic&&<div style={{fontSize:11,color:"#444",fontStyle:"italic"}}>/{currentCard.phonetic}/</div>}
                {isReverse&&<div style={{marginTop:4}}><SpeakBtn text={currentCard.de} size={36} showSlow={true}/></div>}
                <div style={{background:"#ffffff06",border:"1px solid #ffffff0e",borderRadius:12,padding:"9px 13px",width:"100%",display:"flex",alignItems:"flex-start",gap:9}}>
                  <div style={{flex:1,fontSize:12,color:"#888",fontStyle:"italic",lineHeight:1.6,textAlign:"left"}}>"{currentCard.example}"</div>
                  <SpeakBtn text={currentCard.example} size={30} showSlow={true}/>
                </div>
                <div style={{background:`${lessonColor}0c`,border:`1px solid ${lessonColor}20`,borderRadius:9,padding:"6px 12px",fontSize:11,color:"#777",width:"100%",textAlign:"left"}}>💡 {currentCard.tip}</div>
              </>
            )}
          </div>

          {/* Action buttons */}
          {flipped&&(
            isSRS?(
              <div style={{display:"flex",gap:10,marginTop:12,animation:"popIn 0.2s ease"}}>
                <button onClick={()=>nextCard(false)} style={{flex:1,background:"#FF6B6B18",border:"1.5px solid #FF6B6B40",color:"#FF6B6B",padding:"14px",borderRadius:13,cursor:"pointer",fontSize:14,fontWeight:900}}>✗ Missed</button>
                <button onClick={()=>nextCard(true)} style={{flex:1,background:"#4ECDC418",border:"1.5px solid #4ECDC440",color:"#4ECDC4",padding:"14px",borderRadius:13,cursor:"pointer",fontSize:14,fontWeight:900}}>✓ Knew it</button>
              </div>
            ):(
              <button onClick={()=>nextCard(true)} style={{width:"100%",marginTop:12,background:lessonColor,border:"none",color:"#000",padding:"14px",borderRadius:13,cursor:"pointer",fontSize:15,fontWeight:900,animation:"popIn 0.2s ease"}}>
                {cardIndex<total-1?"Next Card →":isReverse?"Done! ✓":"Quiz Time! 🎯"}
              </button>
            )
          )}
        </div>
      );
    })()}

    {/* ══════════════════ LESSON QUIZ ══════════════════ */}
    {screen==="quiz"&&activeLesson&&(
      <div style={{paddingTop:10,animation:"popIn 0.3s ease"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <span style={{fontWeight:900,fontSize:16}}>Quiz 🎯</span>
          <div style={{flex:1,height:4,background:"#ffffff0d",borderRadius:99,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${(quizIndex/activeLesson.quiz.length)*100}%`,background:activeLesson.color,borderRadius:99,transition:"width 0.3s"}}/>
          </div>
          <span style={{fontSize:10,color:"#444"}}>{quizIndex+1}/{activeLesson.quiz.length}</span>
        </div>
        <div style={{background:"#0d0d1a",border:"1px solid #1a1a2e",borderRadius:18,padding:"16px",marginBottom:12}}>
          <div style={{fontSize:15,fontWeight:800,lineHeight:1.5}}>{activeLesson.quiz[quizIndex].q}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          {activeLesson.quiz[quizIndex].options.map((opt,i)=>{
            const isCorrect=i===activeLesson.quiz[quizIndex].answer,isSelected=selected===i;
            let bg="#0d0d1a",border="#1a1a2e",color="#f0f0f0",anim="none";
            if(selected!==null){
              if(isCorrect){bg="#4ECDC415";border="#4ECDC4";color="#4ECDC4";if(isSelected)anim="correctPop 0.4s ease";}
              else if(isSelected){bg="#FF6B6B15";border="#FF6B6B";color="#FF6B6B";anim="shake 0.4s ease";}
            }
            return(
              <button key={i} onClick={()=>handleLessonQuiz(i)} style={{background:bg,border:`1.5px solid ${border}`,borderRadius:12,padding:"13px 15px",color,fontSize:14,fontWeight:600,cursor:selected===null?"pointer":"default",textAlign:"left",display:"flex",alignItems:"center",gap:10,animation:anim}}>
                <span style={{width:24,height:24,borderRadius:"50%",background:"#ffffff07",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0}}>
                  {selected!==null?(isCorrect?"✓":isSelected?"✗":["A","B","C","D"][i]):["A","B","C","D"][i]}
                </span>
                <span style={{flex:1}}>{opt}</span>
                {opt.match(/[äöüÄÖÜß]/)&&<span onClick={e=>{e.stopPropagation();speak(opt);}} style={{fontSize:12,opacity:0.3,cursor:"pointer"}}>🔊</span>}
              </button>
            );
          })}
        </div>
      </div>
    )}

    {/* ══════════════════ LISTENING QUIZ ══════════════════ */}
    {screen==="listening"&&listenItems.length>0&&(()=>{
      const item=listenItems[listenIndex];
      return(
        <div style={{paddingTop:10,animation:"popIn 0.3s ease"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
            <span style={{fontWeight:900,fontSize:16}}>🎧 Listening Quiz</span>
            <div style={{flex:1,height:4,background:"#ffffff0d",borderRadius:99,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${(listenIndex/listenItems.length)*100}%`,background:"#A29BFE",borderRadius:99,transition:"width 0.3s"}}/>
            </div>
            <span style={{fontSize:10,color:"#444"}}>{listenIndex+1}/{listenItems.length}</span>
          </div>
          {/* Big play button */}
          <div style={{background:"#0d0d1a",border:"1.5px solid #A29BFE30",borderRadius:22,padding:"30px 20px",textAlign:"center",marginBottom:14}}>
            <div style={{fontSize:12,color:"#555",marginBottom:12,letterSpacing:2,textTransform:"uppercase"}}>What did you hear?</div>
            <button onClick={()=>speak(item.card.de,false)} style={{width:72,height:72,borderRadius:"50%",background:"linear-gradient(135deg,#A29BFE,#6C5CE7)",border:"none",fontSize:28,cursor:"pointer",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px",boxShadow:"0 4px 24px #A29BFE40"}}>🔊</button>
            <div style={{fontSize:11,color:"#444"}}>Tap to replay</div>
            <div style={{marginTop:10,display:"flex",justifyContent:"center",gap:8}}>
              <button onClick={()=>speak(item.card.de,false)} style={{fontSize:11,background:"#A29BFE15",border:"1px solid #A29BFE30",color:"#A29BFE",padding:"5px 12px",borderRadius:20,cursor:"pointer",fontWeight:700}}>🐇 Normal</button>
              <button onClick={()=>speak(item.card.de,true)} style={{fontSize:11,background:"#A29BFE15",border:"1px solid #A29BFE30",color:"#A29BFE",padding:"5px 12px",borderRadius:20,cursor:"pointer",fontWeight:700}}>🐢 Slow</button>
            </div>
          </div>
          {/* Options */}
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            {item.opts.map((opt,i)=>{
              const isCorrect=i===item.correctIdx,isSelected=listenSelected===i;
              let bg="#0d0d1a",border="#1a1a2e",color="#f0f0f0",anim="none";
              if(listenSelected!==null){
                if(isCorrect){bg="#A29BFE18";border="#A29BFE";color="#A29BFE";if(isSelected)anim="correctPop 0.4s ease";}
                else if(isSelected){bg="#FF6B6B15";border="#FF6B6B";color="#FF6B6B";anim="shake 0.35s ease";}
              }
              return(
                <button key={i} onClick={()=>handleListening(i)} style={{background:bg,border:`1.5px solid ${border}`,borderRadius:12,padding:"13px 15px",color,fontSize:14,fontWeight:700,cursor:listenSelected===null?"pointer":"default",textAlign:"left",display:"flex",alignItems:"center",gap:10,animation:anim}}>
                  <span style={{width:24,height:24,borderRadius:"50%",background:"#ffffff07",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0}}>
                    {listenSelected!==null?(isCorrect?"✓":isSelected?"✗":["A","B","C","D"][i]):["A","B","C","D"][i]}
                  </span>
                  <div style={{flex:1}}>
                    <div>{opt.de}</div>
                    {listenSelected!==null&&<div style={{fontSize:11,color:"#555",marginTop:2}}>{opt.en}</div>}
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      );
    })()}

    {/* ══════════════════ LESSON COMPLETE ══════════════════ */}
    {screen==="complete"&&activeLesson&&(
      <div style={{paddingTop:28,textAlign:"center",animation:"popIn 0.4s ease"}}>
        <div style={{fontSize:64}}>{quizScore===activeLesson.quiz.length?"🏆":"⭐"}</div>
        <div style={{fontSize:24,fontWeight:900,marginTop:10}}>Lesson Complete!</div>
        <div style={{color:"#555",marginTop:4}}>{quizScore}/{activeLesson.quiz.length} correct</div>
        <div style={{color:"#FFD700",fontWeight:800,marginTop:4}}>+{GEMS_PER_LESSON+(quizScore===activeLesson.quiz.length?GEMS_PERFECT:0)} 💎</div>
        {char&&<div style={{margin:"18px 0",animation:"float 3s ease-in-out infinite",display:"inline-block"}}><CharacterSVG gender={char.gender} equipped={char.equipped} size={110}/></div>}
        <div style={{background:"#0d0d1a",border:"1px solid #1a1a2e",borderRadius:14,padding:"12px",marginBottom:16,display:"flex",gap:12,justifyContent:"center"}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:18,fontWeight:900,color:"#4ECDC4"}}>{Object.keys(state.srs||{}).length}</div><div style={{fontSize:10,color:"#444"}}>cards tracked</div></div>
          <div style={{width:1,background:"#1a1a2e"}}/>
          <div style={{textAlign:"center"}}><div style={{fontSize:18,fontWeight:900,color:"#FFD700"}}>{dueCount}</div><div style={{fontSize:10,color:"#444"}}>due for review</div></div>
          <div style={{width:1,background:"#1a1a2e"}}/>
          <div style={{textAlign:"center"}}><div style={{fontSize:18,fontWeight:900,color:"#FF6B35"}}>{state.streak}</div><div style={{fontSize:10,color:"#444"}}>day streak</div></div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <button onClick={()=>{setTab("practice");setScreen("home");}} style={{background:"linear-gradient(135deg,#FFD700,#FF8C00)",border:"none",color:"#000",padding:"14px",borderRadius:13,cursor:"pointer",fontSize:14,fontWeight:900}}>🔁 SRS Review Now</button>
          <button onClick={()=>startListening(activeLesson,activeWeek)} style={{background:"#A29BFE18",border:"1px solid #A29BFE30",color:"#A29BFE",padding:"12px",borderRadius:13,cursor:"pointer",fontSize:13,fontWeight:700}}>🎧 Listening Quiz</button>
          <button onClick={()=>setScreen("home")} style={{background:"#0d0d1a",border:"1px solid #1a1a2e",color:"#888",padding:"11px",borderRadius:13,cursor:"pointer",fontSize:13}}>Back to Lessons</button>
        </div>
      </div>
    )}

    {/* ══════════════════ SRS COMPLETE ══════════════════ */}
    {screen==="srscomplete"&&(
      <div style={{paddingTop:36,textAlign:"center",animation:"popIn 0.4s ease"}}>
        <div style={{fontSize:64}}>🔁</div>
        <div style={{fontSize:24,fontWeight:900,marginTop:10}}>SRS Session Done!</div>
        <div style={{color:"#555",marginTop:4}}>Reviewed {cardQueue.length} card{cardQueue.length!==1?"s":""}</div>
        <div style={{background:"#0d0d1a",border:"1px solid #1a1a2e",borderRadius:14,padding:"14px",margin:"20px 0",fontSize:13,color:"#888",lineHeight:1.7}}>
          The spaced repetition algorithm has updated all your card intervals. Cards you struggled with will appear sooner; cards you knew will be spaced out further.
        </div>
        {char&&<div style={{animation:"float 3s ease-in-out infinite",display:"inline-block",marginBottom:16}}><CharacterSVG gender={char.gender} equipped={char.equipped} size={100}/></div>}
        <button onClick={()=>setScreen("home")} style={{width:"100%",background:"linear-gradient(135deg,#FFD700,#FF8C00)",border:"none",color:"#000",padding:"14px",borderRadius:13,cursor:"pointer",fontSize:15,fontWeight:900}}>Back to Home</button>
      </div>
    )}

    {/* ══════════════════ LISTEN COMPLETE ══════════════════ */}
    {screen==="listencomplete"&&(
      <div style={{paddingTop:36,textAlign:"center",animation:"popIn 0.4s ease"}}>
        <div style={{fontSize:64}}>{listenScore>=listenItems.length*0.8?"🎧":"👂"}</div>
        <div style={{fontSize:24,fontWeight:900,marginTop:10}}>Listening Done!</div>
        <div style={{color:"#555",marginTop:4}}>{listenScore}/{listenItems.length} correct · {Math.round((listenScore/listenItems.length)*100)}%</div>
        {listenScore>=listenItems.length*0.7&&<div style={{color:"#FFD700",fontWeight:800,marginTop:4}}>+10 💎 listening bonus!</div>}
        <div style={{background:"#0d0d1a",border:"1px solid #1a1a2e",borderRadius:14,padding:"14px",margin:"18px 0",fontSize:13,color:"#888",lineHeight:1.7}}>
          {listenScore===listenItems.length?"Perfect score! Your listening ear is sharp 👂":"Keep practising — listening is the hardest skill and improves with repetition."}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <button onClick={()=>startListening(activeLesson,activeWeek)} style={{background:"#A29BFE",border:"none",color:"#000",padding:"14px",borderRadius:13,cursor:"pointer",fontSize:14,fontWeight:900}}>Try Again 🔄</button>
          <button onClick={()=>setScreen("home")} style={{background:"#0d0d1a",border:"1px solid #1a1a2e",color:"#888",padding:"11px",borderRadius:13,cursor:"pointer",fontSize:13}}>Back to Home</button>
        </div>
      </div>
    )}

    {/* ══════════════════ WEEK TEST ══════════════════ */}
    {screen==="weektest"&&activeWeek&&(
      <div style={{paddingTop:10,animation:"popIn 0.3s ease"}}>
        <div style={{background:"#0d0d1a",border:`1.5px solid ${timerColor}25`,borderRadius:14,padding:"11px 15px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontWeight:900,fontSize:15}}>⚡ {activeWeek.title} Test</div><div style={{fontSize:11,color:"#555",marginTop:1}}>70% to pass · {activeWeek.testQuestions.length} questions</div></div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:26,fontWeight:900,color:timerColor,fontFamily:"monospace",animation:timeLeft<=15?"pulse 0.5s infinite":"none"}}>{Math.floor(timeLeft/60)}:{(timeLeft%60).toString().padStart(2,"0")}</div>
            <div style={{height:3,width:60,background:"#ffffff0d",borderRadius:99,overflow:"hidden",marginTop:3}}>
              <div style={{height:"100%",width:`${timerPct*100}%`,background:timerColor,borderRadius:99,transition:"all 1s linear"}}/>
            </div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <div style={{flex:1,height:4,background:"#ffffff0d",borderRadius:99,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${(quizIndex/activeWeek.testQuestions.length)*100}%`,background:activeWeek.color,borderRadius:99,transition:"width 0.3s"}}/>
          </div>
          <span style={{fontSize:10,color:"#444"}}>{quizIndex+1}/{activeWeek.testQuestions.length}</span>
        </div>
        <div style={{background:"#0d0d1a",border:"1px solid #1a1a2e",borderRadius:18,padding:"20px 16px",marginBottom:12,fontSize:15,fontWeight:800,lineHeight:1.5}}>
          {activeWeek.testQuestions[quizIndex].q}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {activeWeek.testQuestions[quizIndex].options.map((opt,i)=>{
            const isCorrect=i===activeWeek.testQuestions[quizIndex].answer,isSelected=selected===i;
            let bg="#0d0d1a",border="#1a1a2e",color="#f0f0f0",anim="none";
            if(selected!==null){
              if(isCorrect){bg="#4ECDC415";border="#4ECDC4";color="#4ECDC4";}
              else if(isSelected){bg="#FF6B6B15";border="#FF6B6B";color="#FF6B6B";anim="shake 0.4s ease";}
            }
            return(<button key={i} onClick={()=>handleWeekTest(i)} style={{background:bg,border:`1.5px solid ${border}`,borderRadius:12,padding:"13px 15px",color,fontSize:14,fontWeight:600,cursor:selected===null?"pointer":"default",textAlign:"left",display:"flex",alignItems:"center",gap:10,animation:anim}}>
              <span style={{width:24,height:24,borderRadius:"50%",background:"#ffffff07",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0}}>{selected!==null?(isCorrect?"✓":isSelected?"✗":["A","B","C","D"][i]):["A","B","C","D"][i]}</span>
              <span style={{flex:1}}>{opt}</span>
              {opt.match(/[äöüÄÖÜß]/)&&<span onClick={e=>{e.stopPropagation();speak(opt);}} style={{fontSize:12,opacity:0.3,cursor:"pointer"}}>🔊</span>}
            </button>);
          })}
        </div>
      </div>
    )}

    {/* ══════════════════ TEST RESULT ══════════════════ */}
    {screen==="testresult"&&activeWeek&&(()=>{
      const passed=(quizScore/activeWeek.testQuestions.length)>=0.7;

            <div style={{fontSize:26,fontWeight:900,color:passed?"#4ECDC4":"#FF6B6B"}}>{passed?`+${GEMS_TEST_PASS}`:GEMS_TEST_FAIL} 💎</div>

          </div>
